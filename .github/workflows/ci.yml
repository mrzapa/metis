name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Validate JSON config
        run: |
          python - <<'PY'
          import json
          with open('axiom_app/default_settings.json', encoding='utf-8') as f:
              json.load(f)
          print('default_settings.json is valid JSON')
          PY

      - name: Lint (ruff)
        run: ruff check .

      - name: Run tests with coverage
        run: python -m pytest --cov=axiom_app --cov-report=xml --cov-report=term

      - name: CLI smoke (headless)
        run: |
          python - <<'PY'
          import os
          import pathlib
          import subprocess
          import sys
          import tempfile

          root = pathlib.Path.cwd()
          with tempfile.TemporaryDirectory() as td:
              td_path = pathlib.Path(td)
              doc = td_path / 'smoke.txt'
              doc.write_text('Axiom smoke test content for CLI mode.\n', encoding='utf-8')

              env = dict(os.environ)
              env['AXIOM_NEW_APP'] = '1'

              cmd_index = [sys.executable, 'main.py', '--cli', 'index', '--file', str(doc)]
              cmd_query = [sys.executable, 'main.py', '--cli', 'query', '--file', str(doc), '--question', 'smoke']

              subprocess.run(cmd_index, cwd=root, env=env, check=True)
              subprocess.run(cmd_query, cwd=root, env=env, check=True)

          print('CLI smoke test passed')
          PY

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml-py${{ matrix.python-version }}
          path: coverage.xml

  live-weaviate-proof:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev,live-backends]

      - name: Start Docker Weaviate
        run: docker compose -f docker/weaviate/docker-compose.yml up -d

      - name: Wait for Weaviate readiness
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8080/v1/.well-known/ready >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose -f docker/weaviate/docker-compose.yml logs
          exit 1

      - name: Run strict parity audit
        env:
          AXIOM_TEST_WEAVIATE_URL: http://127.0.0.1:8080
          AXIOM_TEST_WEAVIATE_GRPC_HOST: 127.0.0.1
          AXIOM_TEST_WEAVIATE_GRPC_PORT: "50051"
          AXIOM_TEST_WEAVIATE_GRPC_SECURE: "false"
        run: python -m axiom_app.audit --require-live-backends

      - name: Show Weaviate logs on failure
        if: failure()
        run: docker compose -f docker/weaviate/docker-compose.yml logs

      - name: Stop Docker Weaviate
        if: always()
        run: docker compose -f docker/weaviate/docker-compose.yml down -v

  windows-runtime-smoke:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Create venv and install runtime bundle
        shell: pwsh
        run: |
          python -m venv .venv-ci
          & .\.venv-ci\Scripts\python.exe -m pip install --upgrade pip
          & .\.venv-ci\Scripts\python.exe -m pip install -e ".[runtime-all]"

      - name: Verify dependency graph
        shell: pwsh
        run: |
          & .\.venv-ci\Scripts\python.exe -m pip check

      - name: CLI smoke (headless)
        shell: pwsh
        run: |
          @'
          import os
          import pathlib
          import subprocess
          import sys
          import tempfile

          root = pathlib.Path.cwd()
          with tempfile.TemporaryDirectory() as td:
              td_path = pathlib.Path(td)
              doc = td_path / "smoke.txt"
              doc.write_text("Axiom smoke test content for CLI mode.\n", encoding="utf-8")

              env = dict(os.environ)
              env["AXIOM_NEW_APP"] = "1"

              cmd_index = [sys.executable, "main.py", "--cli", "index", "--file", str(doc)]
              cmd_query = [sys.executable, "main.py", "--cli", "query", "--file", str(doc), "--question", "smoke"]

              subprocess.run(cmd_index, cwd=root, env=env, check=True)
              subprocess.run(cmd_query, cwd=root, env=env, check=True)

          print("CLI smoke test passed")
          '@ | & .\.venv-ci\Scripts\python.exe -
