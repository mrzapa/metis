name: Release METIS Installer

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-installer:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build web UI static export
        run: |
          cd apps/metis-web
          npm install --silent
          npm run build
          # Package the static export so end users can skip the Node.js requirement
          tar -czf ../../metis-web-dist.tar.gz -C out .
        continue-on-error: true

      - name: Prepare release artifacts
        run: |
          mkdir -p release-artifacts

          # Copy installer scripts
          cp scripts/install_metis.sh  release-artifacts/install_metis.sh
          cp scripts/install_metis.ps1 release-artifacts/install_metis.ps1
          chmod +x release-artifacts/install_metis.sh

          # Include pre-built web UI if the build succeeded
          if [ -f metis-web-dist.tar.gz ]; then
            cp metis-web-dist.tar.gz release-artifacts/metis-web-dist.tar.gz
          fi

          # Create a one-liner bootstrap wrapper for curl|bash convenience
          cat > release-artifacts/install.sh <<'BOOTSTRAP'
          #!/usr/bin/env bash
          # METIS quick-install bootstrap
          # Usage: curl -fsSL https://raw.githubusercontent.com/mrzapa/metis/main/scripts/install_metis.sh | bash
          set -euo pipefail
          TMPDIR=$(mktemp -d)
          trap 'rm -rf "$TMPDIR"' EXIT
          curl -fsSL https://raw.githubusercontent.com/mrzapa/metis/main/scripts/install_metis.sh -o "$TMPDIR/install_metis.sh"
          chmod +x "$TMPDIR/install_metis.sh"
          exec "$TMPDIR/install_metis.sh" "$@"
          BOOTSTRAP
          chmod +x release-artifacts/install.sh

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: metis-installer
          path: release-artifacts/

      - name: Attach installers to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/install_metis.sh
            release-artifacts/install_metis.ps1
            release-artifacts/install.sh
            release-artifacts/metis-web-dist.tar.gz
          body: |
            ## METIS Installer Release

            ### Quick Install

            **macOS / Linux:**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/mrzapa/metis/main/scripts/install_metis.sh | bash
            ```

            **Windows (PowerShell):**
            ```powershell
            irm https://raw.githubusercontent.com/mrzapa/metis/main/scripts/install_metis.ps1 | iex
            ```

            ### Manual Install
            Download the installer script for your platform from the assets below and run it.

            ### Options
            | Flag | Description |
            |------|-------------|
            | `--install` | Fresh install (default) |
            | `--reinstall` | Remove venv and reinstall from scratch |
            | `--uninstall` | Remove METIS completely |
            | `--update` | Pull latest code and update deps |
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Also build the Windows EXE alongside the installer
  windows-exe:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Build METIS MVC executable
        shell: bash
        run: |
          pyinstaller \
            --noconfirm \
            --clean \
            --name METIS \
            --windowed \
            --onefile \
            --icon logo.png \
            --add-data "metis_app/default_settings.json;metis_app" \
            --collect-submodules metis_app \
            release/metis_mvc_entry.py

      - name: Create release archive
        shell: bash
        run: |
          mkdir -p release-artifacts
          cp dist/METIS.exe release-artifacts/METIS.exe
          cd release-artifacts
          7z a METIS-windows-x64.zip METIS.exe

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: METIS-windows-x64
          path: release-artifacts/METIS-windows-x64.zip

      - name: Attach EXE to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/METIS-windows-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
