patterns_found:
  - category: architecture
    pattern: UI-to-API-to-agent (METIS) vs UI-to-agent-chat-bridge (agent-native)
    description: In METIS, the Next.js frontend calls the Python API which runs the agentic RAG loop. In agent-native, the UI calls sendToAgentChat() which routes to the CLI-based agent, and all results flow through the shared SQL database. METIS has a tighter API coupling; agent-native's bridge is more loosely coupled through the database.
    examples:
      - file: apps/metis-web/app/chat/page.tsx
        location: page.tsx:1028
        snippet: "await startRagStream({ ... }); // POST /v1/query/rag/stream → SSE"
      - file: AGENTS.md (agent-native)
        location: AGENTS.md#rule-2
        snippet: "sendToAgentChat() // UI delegates to agent; agent writes to DB; UI polls"
    prevalence: common

  - category: streaming
    pattern: SSE-based result delivery
    description: Both systems use Server-Sent Events. METIS uses POST-based SSE (EventSource is GET-only; METIS uses fetch+ReadableStream). agent-native uses both polling (/api/poll) and SSE for real-time sync.
    examples:
      - file: apps/metis-web/lib/api.ts
        location: lib/api.ts:1002
        snippet: "readSseEvents<T>(res, onEvent) // ReadableStream parser"
      - file: metis_app/api/app.py
        location: app.py:362
        snippet: "media_type='text/event-stream' // brain_graph_events SSE"
    prevalence: common

  - category: skills
    pattern: YAML-frontmatter + Markdown body skill files
    description: METIS stores skills in skills/*/SKILL.md with YAML frontmatter for triggers/overrides, Markdown body for LLM instructions. agent-native stores agent guidance in .agents/skills/*/SKILL.md. Both use frontmatter + prose body, but serve different layers — retrieval-time vs agent-CLI invocation.
    examples:
      - file: skills/summary-blinkist/SKILL.md
        location: SKILL.md:1
        snippet: "---\nid: summary-blinkist\ntriggers:\n  keywords: [summarize]\nruntime_overrides:\n  selected_mode: Summary\n---"
      - file: .agents/skills/ (agent-native)
        location: AGENTS.md#skills-table
        snippet: "storing-data | real-time-sync | delegate-to-agent | scripts | self-modifying-code"
    prevalence: common

  - category: state management
    pattern: Session-scoped state vs SQL-backed application state
    description: METIS tracks per-session chat history + trace events in Python service layer (session repository) and surfaces them via /v1/sessions/{id}. agent-native stores all ephemeral state in application_state SQL table, keyed by session ID + key; both agent and UI can read/write.
    examples:
      - file: apps/metis-web/app/chat/page.tsx
        location: page.tsx:190
        snippet: "const [sessionMeta, setSessionMeta] = useArrowState<SessionSummary | null>(null);"
    prevalence: common

  - category: auth
    pattern: Token-based, dev-bypassed auth
    description: Both systems share the same auth philosophy — zero friction in development, single env var activates token-based auth in production. METIS uses METIS_API_TOKEN; agent-native uses ACCESS_TOKEN.
    examples:
      - file: AGENTS.md (agent-native — auth section)
        location: AGENTS.md#authentication
        snippet: "ACCESS_TOKEN=your-secret pnpm start"
      - file: metis_app/api/app.py
        location: app.py (referenced)
        snippet: "METIS_API_TOKEN environment variable guard"
    prevalence: common

  - category: architecture
    pattern: Agent-modifiable code / self-evolving skills
    description: agent-native's Rule 5 allows the agent to edit app source. METIS's skill system is the closest analogue — skills are read at query time and can be created/modified by the agent. However METIS has no runtime code-modify pathway for the Python backend; the agent-native approach is more ambitious.
    examples:
      - file: AGENTS.md (agent-native)
        location: AGENTS.md#rule-5
        snippet: "The agent can edit the app's own source code — components, routes, styles, scripts."
      - file: metis_app/services/skill_repository.py
        location: skill_repository.py:202
        snippet: "SkillRepository.load_all() # each query resolves skills at runtime from disk"
    prevalence: occasional


related_architecture:
  components_relevant_to_domain:
    - component: metis_app/api/app.py (FastAPI) / api_litestar/ (Litestar)
      responsibility: HTTP + SSE entry point for all agent interactions
      location: metis_app/api/ and metis_app/api_litestar/
      relationship_to_domain: domain depends on this — integration point where agent-native patterns would connect
    - component: apps/metis-web/lib/api.ts
      responsibility: Typed client-side fetch wrappers for all METIS API routes
      location: apps/metis-web/lib/api.ts
      relationship_to_domain: domain depends on this — sendToAgentChat()-equivalent would live here
    - component: metis_app/services/skill_repository.py + runtime_resolution.py
      responsibility: Skill loading, trigger scoring, runtime settings assembly, system prompt construction
      location: metis_app/services/
      relationship_to_domain: direct analogue to agent-native .agents/skills/ — extension point for agent-native skill patterns
    - component: apps/metis-web/app/chat/page.tsx
      responsibility: Chat UI orchestration — sessions, streaming, trace events
      location: apps/metis-web/app/chat/page.tsx
      relationship_to_domain: UI layer where sendToAgentChat() / useFileWatcher() patterns would integrate
    - component: metis_app/engine/streaming.py (agentic loop)
      responsibility: Iterative retrieval → synthesis → gap-critique loop
      location: metis_app/engine/streaming.py
      relationship_to_domain: Python equivalent of agent-native's "agent does the work"; writes output via SSE
    - component: metis_app/models/parity_types.py (SkillDefinition, SkillMatch)
      responsibility: Data contracts for skill selection and runtime resolution
      location: metis_app/models/parity_types.py
      relationship_to_domain: direct structural parallel to agent-native's skill frontmatter schema

  interfaces_used_by_domain:
    - interface: POST /v1/query/rag/stream (SSE)
      location: metis_app/api/app.py
      usage_pattern: Frontend POSTs question + settings; reads token/final/error SSE events
    - interface: GET /v1/brain/graph/events (SSE)
      location: metis_app/api/app.py:362
      usage_pattern: Long-poll SSE; emits brain_snapshot on graph change — closest existing METIS equivalent to agent-native polling
    - interface: /api/poll (agent-native)
      location: agent-native server/routes/api/
      usage_pattern: GET, returns version hash; client polls every 2s; stale-while-revalidate pattern via React Query

  data_flow_involving_domain: |
    METIS current flow:
      User types → chatPage.handleRagSend() → queryRagStream() POST /v1/query/rag/stream
        → Python agentic loop (retrieve → synthesize → gap-critique) → SSE token/final events
        → frontend appends tokens to assistant message → done.
    agent-native flow:
      User types → sendToAgentChat() → agent CLI (Claude Code / Codex) picks up message
        → agent runs scripts, writes to application_state SQL → /api/poll returns new version
        → useFileWatcher() invalidates React Query → UI re-renders with new state.
    Gap: METIS has no agent→UI ephemeral state write path outside of the active SSE stream.
    Gap: METIS has no structured UI-action→agent routing (every action is free-text in chat).

  key_relationships_to_domain:
    - from: agent-native sendToAgentChat()
      to: METIS queryRagStream()
      relationship: functional equivalent — both route user intent to the AI engine
    - from: agent-native application_state SQL table + /api/poll
      to: METIS brain graph SSE (/v1/brain/graph/events)
      relationship: agent-native polling is more general; METIS brain SSE is domain-specific
    - from: agent-native .agents/skills/ (CLI guidance)
      to: METIS skills/ (RAG runtime overrides)
      relationship: same SKILL.md file format; different execution context (CLI vs retrieval pipeline)
    - from: agent-native pnpm script <name>
      to: METIS python main.py --cli
      relationship: same pattern — agent-callable scripts for structured data operations
    - from: agent-native ACCESS_TOKEN
      to: METIS METIS_API_TOKEN
      relationship: identical security philosophy; same bearer-token bearer pattern


