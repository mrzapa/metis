# Integration surface summary (factual, no recommendations)
# ──────────────────────────────────────────────────────────────────────────────
integration_surfaces:

  - id: structured-chat-bridge
    description: |
      agent-native's sendToAgentChat() routes UI actions as structured context messages to the agent.
      METIS equivalent: UI constructs a formatted prompt from a UI action (e.g. "Summarize document X") and calls queryRagStream().
      Existing hook in METIS: handleDirectSend() and handleRagSend() in page.tsx; lib/api.ts wrappers.
      Gap: no structured schema for action type + payload; free-text only.
    files_involved:
      - apps/metis-web/app/chat/page.tsx:567 (handleDirectSend)
      - apps/metis-web/lib/api.ts:1356 (queryRagStream)

  - id: application-state-store
    description: |
      agent-native's application_state SQL table + writeAppState() allow the agent to push ephemeral state that the UI polls.
      METIS has no equivalent — the Python agentic loop writes only to the SSE stream of the active request.
      Adding: a new /v1/app-state/* endpoint family + Python helper + frontend useAppStatePoller() hook.
      The brain graph SSE (/v1/brain/graph/events) is the closest existing primitive but is domain-specific.
    files_involved:
      - metis_app/api/app.py (new route family needed)
      - apps/metis-web/lib/api.ts (new poll hook needed)
      - metis_app/engine/streaming.py (write calls needed)

  - id: polling-sync
    description: |
      agent-native useFileWatcher() polls /api/poll every 2 s; version increment triggers React Query invalidation.
      METIS frontend uses SSE for active streams and one-shot fetches for sessions/settings.
      The brain graph SSE is a push-based equivalent but not a general-purpose poll target.
      A lightweight GET /v1/poll?since=<version> endpoint in METIS would enable the same pattern.
    files_involved:
      - apps/metis-web/app/chat/page.tsx (polling hook would integrate here)
      - metis_app/api/app.py (new /v1/poll endpoint)

  - id: agent-native-as-metis-consumer
    description: |
      METIS REST API (/v1/query/rag/stream, /v1/index/list, /v1/sessions) could be the AI backend for an agent-native template app.
      The agent-native template's sendToAgentChat() would forward user messages to METIS /v1/query/rag/stream.
      agent-native handles UI, sessions, auth, and code evolution; METIS handles RAG retrieval and synthesis.
      No code changes to METIS required; requires a custom agent-native template or adapter script.
    files_involved:
      - metis_app/api/app.py (METIS API surface — consumed as-is)
      - agent-native templates (new template would import METIS API base URL)

  - id: skill-system-cross-pollination
    description: |
      Both codebases use SKILL.md (YAML frontmatter + Markdown body) for different purposes.
      METIS skills/ → retrieval-time prompt assembly and parameter overrides.
      agent-native .agents/skills/ → agent CLI guidance (no runtime trigger scoring).
      A METIS skill could document agent-native patterns for the METIS agentic loop to follow when in Research mode.
      Conversely, a METIS agent-native skill could expose the `pnpm script` / `python main.py --cli` interface to the agent.
    files_involved:
      - skills/ (METIS skill directory)
      - metis_app/services/skill_repository.py
      - metis_app/services/runtime_resolution.py

  - id: python-scripts-pattern
    description: |
      agent-native Rule 3: agent invokes pnpm script <name> for data operations.
      METIS equivalent: python main.py --cli (existing) or python -m metis_app.scripts.<name> (new).
      METIS already has a CLI module (metis_app/cli.py) with subcommands (index, query, skills).
      Gap: no structured "agent-callable script" discovery mechanism; agent must know CLI command signatures.
    files_involved:
      - metis_app/cli.py
      - main.py

  - id: npm-package-import
    description: |
      "@agent-native/core" could be installed in apps/metis-web.
      Client-side exports (sendToAgentChat, useSession, useFileWatcher, application-state helpers) may work against any REST backend.
      Server-side exports (autoMountAuth, defineNitroPlugin) require Nitro/H3; incompatible with Python backend.
      Risk: package source not fully read; actual tree-shaking / server/client boundary not confirmed.
    files_involved:
      - apps/metis-web/package.json (would add @agent-native/core dependency)
