      usage_in_domain: File-based API routes; SSR catch-all; plugin system for auth + DB
    - name: React Router v7 — agent-native frontend
      usage_in_domain: File-based page routes; flat routes config
    - name: Next.js (App Router) — METIS frontend
      usage_in_domain: Client-side only rendering; chat page and brain visualization
    - name: FastAPI / Litestar — METIS backend
      usage_in_domain: REST + SSE API for RAG queries, sessions, settings, brain graph
    - name: Drizzle ORM — agent-native database layer
      usage_in_domain: Dialect-agnostic SQL; SQLite local fallback, Postgres/Neon/Turso in production
    - name: React Query — agent-native client
      usage_in_domain: Cache invalidation on poll version bump; drives UI sync

  libraries_used_in_domain:
