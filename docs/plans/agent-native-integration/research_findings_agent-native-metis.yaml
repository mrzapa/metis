plan_id: agent-native-integration
objective: Research how BuilderIO/agent-native framework could be incorporated into METIS
focus_area: agent-native framework vs METIS architecture — integration surface mapping
created_at: "2026-04-02"
created_by: gem-researcher
status: completed

tldr: |
  - agent-native (MIT, TypeScript) is a framework for apps where an AI agent and a UI are bidirectionally connected; METIS is a Python RAG engine with a Next.js frontend — the architectures overlap at chat-bridge, skills, and streaming patterns.
  - The most direct integration surfaces are: (1) adopting agent-native's UI→agent structured chat-bridge pattern in metis-web, (2) adding a backend-writable application-state store so the Python agentic loop can push ephemeral state the frontend polls, (3) modelling METIS as an agent-native backend so agent-native templates can consume METIS RAG as the AI layer.
  - METIS already has SSE, skills, sessions, and a brain graph — agent-native's polling sync, `sendToAgentChat()`, and scripting patterns are the clearest additive contributions rather than replacements.
  - agent-native's `@agent-native/core` npm package targets a Nitro/H3 TypeScript server; using it directly in metis-web requires a Node.js sidecar or shim — not a zero-cost import.
  - The skills/SKILL.md system in METIS and the `.agents/skills/` system in agent-native are structurally analogous but serve different layers (retrieval-time prompt assembly vs agent CLI guidance; both are YAML + Markdown).


research_metadata:
  methodology: hybrid retrieval — semantic_search (METIS codebase) + fetch_webpage (GitHub README, AGENTS.md, docs/auth.md, packages/core/README.md for agent-native); relationship discovery via architecture memory files
  scope: agent-native public repo (README, AGENTS.md, docs/auth.md, packages listing); METIS backend (api/, engine/, services/, models/), frontend (apps/metis-web/), and skill system
  confidence: high
  coverage: 85  # agent-native internals (core package source) not read; METIS retrieval pipeline internals partially covered via memory


