      purpose_in_domain: Required component library; templates include app/components/ui/
    - name: Tailwind CSS (both)
      purpose_in_domain: Styling in both agent-native templates and metis-web

  external_apis_used_in_domain:
    - name: Any CLI-based AI agent (Claude Code, Codex, Cursor)
      integration_point: agent-native agent panel (.agents/ directory); agent reads AGENTS.md, runs scripts


related_conventions:
  naming_patterns_in_domain: |
    agent-native: camelCase TypeScript; file-based routes in server/routes/api/*.get.ts / *.post.ts
    METIS backend: snake_case Python; routers in metis_app/api/ and metis_app/api_litestar/
    METIS frontend: camelCase TypeScript; Next.js app router pages in apps/metis-web/app/
  structure_of_domain: |
    agent-native: app/ (React pages+components) | server/ (Nitro API+plugins) | shared/ | scripts/ | data/
    METIS: metis_app/ (Python backend) | apps/metis-web/ (Next.js frontend) | skills/ | tests/
  error_handling_in_domain: |
    agent-native: Scripts return structured errors; agent retries or escalates
    METIS frontend: AbortController + SSE error events; handleInterruption() path in page.tsx
  testing_in_domain: |
    agent-native: Vitest (from packages/README)
    METIS: pytest (tests/ directory); conftest.py; 50+ test files
  documentation_in_domain: |
    agent-native: AGENTS.md (authoritative rules) + docs/ directory + agent-native.com
    METIS: AGENTS.md (overview) + docs/ directory + skill SKILL.md files


related_dependencies:
  internal:
    - component: metis_app/services/skill_repository.py → metis_app/models/parity_types.py
      relationship_to_domain: SkillDefinition and SkillMatch dataclasses are the shared data contract
      direction: outbound
    - component: apps/metis-web/app/chat/page.tsx → apps/metis-web/lib/api.ts
      relationship_to_domain: All API calls go through lib/api.ts typed wrappers
      direction: outbound
    - component: agent-native templates → @agent-native/core
      relationship_to_domain: Core package provides sendToAgentChat, useFileWatcher, application-state, auth
      direction: outbound
  external:
    - name: "@agent-native/core" npm package
      purpose_for_domain: Would need to be added to apps/metis-web to use agent-native client primitives; requires Nitro server compatibility or custom adapter
    - name: Drizzle ORM (agent-native dep)
      purpose_for_domain: Not currently used in METIS; METIS uses Python SQLAlchemy-style ORM or direct SQLite via aiosqlite in session store


domain_security_considerations:
  sensitive_areas:
    - area: sendToAgentChat() — structured context injection
      location: agent-native AGENTS.md#rule-2
      concern: UI pushes structured content to agent's input; if not sanitized, a malicious page element could inject instructions into the agent's context (prompt injection surface)
    - area: writeAppState() — agent writes to shared SQL application_state
      location: agent-native AGENTS.md#rule-6
      concern: Agent can write arbitrary values to application_state that the UI renders; XSS risk if values are rendered as HTML without sanitization
    - area: "pnpm script / python main.py --cli — agent-callable scripts"
      location: AGENTS.md (both)
      concern: Scripts execute with full server permissions; agent-native's db-exec allows arbitrary SQL mutations — no RLS by default in dev mode
    - area: Agent modifies app code (agent-native Rule 5)
      location: AGENTS.md (agent-native)
      concern: If agent processes external content (emails, web pages) and then modifies source files, a crafted document could trigger code injection
  authentication_patterns_in_domain: |
    agent-native: ACCESS_TOKEN env var → httpOnly cookie sessions stored in data/.sessions.json; dev mode bypassed entirely
    METIS: METIS_API_TOKEN Bearer auth on protected endpoints; no login page (API-key model)
  authorization_patterns_in_domain: |
    agent-native: Multi-tenant scoping via AGENT_USER_EMAIL on all SQL queries; temp views shadow real tables with WHERE filter
    METIS: Single-tenant local-first model; token guards API surface but no per-user data isolation
  data_validation_in_domain: |
    agent-native: parseArgs() in scripts; getDbExec() abstraction for dialect-agnostic parameterized queries
    METIS: Pydantic models at API boundary (FastAPI/Litestar); SSE event normalization in normalizeRagStreamEvent()


testing_patterns:
  framework: pytest (METIS), Vitest (agent-native)
  coverage_areas:
    - METIS — RAG streaming, skill resolution, session CRUD, brain graph, API routes, embedding providers, GGUF serialization
    - agent-native — component rendering (inferred from Vitest config in packages/)
  test_organization: |
    METIS: flat tests/ directory with test_*.py files; conftest.py with shared fixtures
    agent-native: test files co-located with packages (inferred from Vitest config)
  mock_patterns:
    - METIS — monkeypatching LLM providers in conftest.py; mock vector stores for retrieval tests


open_questions:
  - question: Does @agent-native/core require the Nitro/H3 server to be present, or can sendToAgentChat() and useFileWatcher() be used with any REST backend?
    context: If core is server-agnostic on the client side, then apps/metis-web could import just the client hooks and point them at METIS API endpoints (/v1/app-state/poll instead of /api/poll).
  - question: What exactly does the agent-native "agent panel" look like — is it a separate iframe/webview or part of the react app?
    context: agent-native README mentions "embedded agent panel with chat and optional CLI terminal"; understanding whether this is embeddable in metis-web determines UI layer integration complexity.
  - question: Can METIS's Python agentic loop (streaming.py) write to a lightweight application_state store (SQLite/Redis) that the frontend polls, without a full agent-native refactor?
    context: The gap between METIS's SSE-only agent output and agent-native's bidirectional state model requires a new Python endpoint; feasibility depends on METIS's session store backend.
  - question: agent-native's "agent modifies code" rule (Rule 5) — how does this work when the agent is Claude Code or Codex? Does it directly edit files in the repo, or is there an intermediary?
    context: If METIS were to adopt this pattern, the Python skill system would need a "create skill" pathway the agent can invoke during a chat session.


gaps:
  - area: agent-native packages/core source code
    description: The internal implementation of sendToAgentChat(), useFileWatcher(), autoMountAuth(), and application-state helpers was not read — only docs/AGENTS.md were accessed.
    impact: Cannot confirm whether @agent-native/core client APIs are decoupled from the Nitro server runtime, which is the central question for direct npm import into apps/metis-web.
  - area: agent-native /api/poll endpoint implementation
    description: Exact polling contract (response shape, version fields, cache headers) not confirmed from source; only described in AGENTS.md.
    impact: Designing a compatible METIS /v1/app-state/poll endpoint requires knowing the exact protocol.
  - area: METIS session store backend
    description: The session repository implementation (metis_app/services/session_repository.py) was not fully read; unknown whether it backs onto SQLite, in-memory, or file-based store that could double as application_state.
    impact: Determines implementation cost of adding a generic application_state table the Python agentic loop can write to.
  - area: agent-native mobile-app and desktop-app packages
    description: packages/mobile-app and packages/desktop-app not inspected; METIS also has apps/metis-desktop/.
    impact: Potential cross-platform integration angles (Tauri desktop app) not mapped.


