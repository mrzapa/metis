plan_id: agent-native-impl-20260402
variant: a
objective: |
  Incorporate patterns from BuilderIO/agent-native into the METIS local-first RAG workspace.
  Implement four integration surfaces in priority order:
  1. Application-state store (Python SQLite KV service + FastAPI + Litestar routes + frontend poll hook)
  2. Polling sync endpoint (GET /v1/poll?since=<version>) bundled with route tasks
  3. Structured chat bridge (ActionPayload typed payloads in handleDirectSend / handleRagSend)
  4. Agent-native bridge skill (SKILL.md documenting agent-native patterns for the METIS agentic loop)
created_at: "2026-04-02T00:00:00Z"
created_by: gem-planner
complexity: medium
status: pending_approval
research_confidence: high

plan_metrics:
  wave_1_task_count: 3
  total_dependencies: 15
  risk_score: medium

tldr: |
  Nine tasks across three waves implement agent-native state sharing in METIS.
  Wave 1 builds three independent foundations: the Python AppStateService, the skill
  document, and TypeScript API wrappers. Wave 2 wires those foundations into both
  FastAPI and Litestar backends, adds the polling hook, and extends the chat bridge.
  Wave 3 adds pytest coverage and a final review. Existing SSE streaming is untouched.

open_questions:
  - Should AppStateService share rag_sessions.db or write to a separate app_state.db?
    (Separate file avoids WAL contention; confirmed constraint is SQLite only.)
  - Is @agent-native/core npm package needed on the frontend, or pure fetch wrappers suffice?
    (Plan assumes pure fetch wrappers to avoid unknown server/client boundary constraints.)
  - Should the poll version counter be in-memory (resets on restart) or persisted in SQLite?
    (Plan uses SQLite-backed counter for durability across server restarts.)

pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: "SQLite WAL contention between SessionRepository and AppStateService if they share rag_sessions.db under concurrent RAG workloads"
      likelihood: medium
      impact: medium
      mitigation: "Write AppStateService to a separate app_state.db file; both use WAL mode + PRAGMA busy_timeout=30000 to avoid deadlocks."
    - scenario: "Litestar backend drifts from FastAPI — routes added to FastAPI but not Litestar, breaking METIS_API_BACKEND=litestar users"
      likelihood: medium
      impact: medium
      mitigation: "task-05 is explicitly parallel to task-04 and uses identical AppStateService; wave-3 review validates parity."
    - scenario: "XSS via raw app_state values rendered into the DOM without escaping"
      likelihood: low
      impact: high
      mitigation: "Frontend hook returns raw JSON values rendered only through React text nodes (no dangerouslySetInnerHTML); task-09 review enforces this."
  assumptions:
    - Both FastAPI and Litestar receive identical new routes (AGENTS.md constraint).
    - AppStateService is session-scoped; no cross-session reads are possible via the API.
    - The poll version counter is a monotonic INTEGER column in app_state.db, not an in-memory counter.
    - No npm packages are added; frontend integration uses plain fetch wrappers in lib/api.ts.
    - Existing SSE streaming path (metis_app/engine/streaming.py) is not modified.

implementation_specification:
  code_structure: |
    New Python service (metis_app/services/app_state_service.py) owns all SQLite I/O.
    Backend routes are thin adapters that call the service; no business logic in route handlers.
    FastAPI routes live in a new metis_app/api/app_state.py module registered in app.py.
    Litestar routes live in a new metis_app/api_litestar/routes/app_state.py module registered in app.py.
    Frontend: new hook (hooks/use-app-state-poller.ts) + wrappers appended to lib/api.ts.
    ActionPayload interface is defined in lib/api.ts and imported by page.tsx.
    The skill document (skills/agent-native-bridge/SKILL.md) is self-contained.
  affected_areas:
    - metis_app/services/ (new AppStateService)
    - metis_app/api/ (new module + registration)
    - metis_app/api_litestar/routes/ (new module + registration)
    - apps/metis-web/lib/api.ts (new exported functions + interface)
    - apps/metis-web/hooks/ (new hook file)
    - apps/metis-web/app/chat/page.tsx (ActionPayload injection)
    - skills/agent-native-bridge/ (new skill directory + SKILL.md)
    - tests/ (new test file)
  component_details:
    - component: AppStateService
      responsibility: |
        SQLite-backed ephemeral KV store. Tables: app_state (session_id TEXT, key TEXT,
        value TEXT, version INTEGER, updated_at TEXT, PRIMARY KEY (session_id, key));
        version_counter (id INTEGER PRIMARY KEY, version INTEGER DEFAULT 0).
        Exposes read(), write(), delete(), list(), get_version() methods.
        write() atomically increments version_counter.version.
      interfaces:
        - "read(session_id: str, key: str) -> str | None"
        - "write(session_id: str, key: str, value: str) -> int  # returns new version"
        - "delete(session_id: str, key: str) -> None"
        - "list(session_id: str) -> list[dict]  # [{key, value, version, updated_at}]"
        - "get_version() -> int"
    - component: FastAPI app_state routes (metis_app/api/app_state.py)
      responsibility: |
        Expose GET/POST/DELETE /v1/app-state/{session_id}/{key},
        GET /v1/app-state/{session_id}, and GET /v1/poll?since=<version>.
        Delegates entirely to AppStateService; enforces _require_token guard.
      interfaces:
        - "GET /v1/app-state/{session_id} -> list[AppStateEntry]"
        - "GET /v1/app-state/{session_id}/{key} -> AppStateEntry"
        - "POST /v1/app-state/{session_id}/{key} body:{value:str} -> {version:int}"
        - "DELETE /v1/app-state/{session_id}/{key} -> {ok:bool}"
        - "GET /v1/poll?since=<int> -> {version:int, changed:bool}"
    - component: Litestar app_state routes (metis_app/api_litestar/routes/app_state.py)
      responsibility: Mirror of FastAPI routes using Litestar handler decorators.
      interfaces:
        - "Identical URL surface as FastAPI app_state routes above"
    - component: useAppStatePoller (apps/metis-web/hooks/use-app-state-poller.ts)
      responsibility: |
        React hook that polls GET /v1/poll?since=<version> every 2 s.
        On changed=true, re-fetches /v1/app-state/{sessionId}.
        Returns {appState: Record<string,string>, version: number}.
      interfaces:
        - "useAppStatePoller(sessionId: string | null, intervalMs?: number): AppStatePollerResult"
    - component: ActionPayload + API wrappers (apps/metis-web/lib/api.ts additions)
      responsibility: |
        Export ActionPayload interface; export getAppState(), setAppState(),
        deleteAppState(), pollSync() fetch wrappers.
      interfaces:
        - "interface ActionPayload { action_type: string; payload: Record<string, unknown>; session_id?: string }"
        - "getAppState(sessionId: string, key?: string): Promise<AppStateEntry | AppStateEntry[]>"
        - "setAppState(sessionId: string, key: string, value: string): Promise<{version: number}>"
        - "deleteAppState(sessionId: string, key: string): Promise<{ok: boolean}>"
        - "pollSync(since: number): Promise<{version: number; changed: boolean}>"
    - component: Chat bridge extension (apps/metis-web/app/chat/page.tsx)
      responsibility: |
        handleDirectSend and handleRagSend optionally accept ActionPayload.
        When action_type is present, prepend structured context block to the
        message string before passing to queryDirect / queryRagStream.
      interfaces:
        - "handleDirectSend(prompt: string, action?: ActionPayload): Promise<void>"
        - "handleRagSend(prompt: string, action?: ActionPayload): Promise<void>"
    - component: agent-native-bridge skill (skills/agent-native-bridge/SKILL.md)
      responsibility: |
        SKILL.md with YAML frontmatter instructing the METIS agentic loop on how to
        use writeAppState() and structured action payloads during RAG iterations.
      interfaces:
        - "Triggers on keywords: app state, agent state, poll, structured action"
        - "runtime_overrides: agentic_mode: true"
  dependencies:
    - component: FastAPI app_state routes
      relationship: imports and instantiates AppStateService
    - component: Litestar app_state routes
      relationship: imports and instantiates AppStateService
    - component: useAppStatePoller hook
      relationship: calls pollSync() and getAppState() from lib/api.ts
    - component: chat bridge extension
      relationship: uses ActionPayload interface imported from lib/api.ts
    - component: AppStateService
      relationship: uses sqlite3 stdlib; writes to app_state.db at repo root
  integration_points:
    - "metis_app/api/app.py: import app_state router and include_router() at /v1 prefix"
    - "metis_app/api_litestar/app.py: add app_state.router to Router list"
    - "apps/metis-web/app/chat/page.tsx: import useAppStatePoller and ActionPayload; wire into ChatPanel props"

