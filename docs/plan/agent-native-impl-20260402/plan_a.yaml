  - id: task-06
    title: "Frontend polling hook — useAppStatePoller (Surface 1 poll hook)"
    description: |
      Create apps/metis-web/hooks/use-app-state-poller.ts.
      Hook signature: useAppStatePoller(sessionId: string | null, intervalMs = 2000)
      Behavior:
        - Maintains local version ref (starts at 0).
        - On mount (and when sessionId changes), immediately fetches /v1/app-state/{sessionId}
          and stores initial version from the latest entry's version field.
        - Sets up setInterval at intervalMs calling pollSync(currentVersion).
        - On changed=true, calls getAppState(sessionId) and updates state.
        - Clears interval on unmount or sessionId change.
        - Returns { appState: Record<string, string>, version: number, isLoading: boolean }.
      Uses pollSync() and getAppState() from lib/api.ts (task-03 contract).
      Use useCallback / useRef to avoid stale-closure bugs (follow use-arrow-state.ts pattern).
      Guard: when sessionId is null, skip polling (return empty appState).
