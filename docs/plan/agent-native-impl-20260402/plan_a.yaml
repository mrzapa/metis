tasks:
  # ─── WAVE 1 — Independent foundations ──────────────────────────────────────
  - id: task-01
    title: "Python AppStateService — SQLite-backed KV store (Surface 1 core)"
    description: |
      Create metis_app/services/app_state_service.py.
      Implement AppStateService class with:
        - SQLite file at repo_root/app_state.db (separate from rag_sessions.db to avoid WAL contention)
        - init_db() creates tables: app_state (session_id, key, value, version INTEGER, updated_at)
          and version_counter (id INTEGER PRIMARY KEY, version INTEGER DEFAULT 0, CHECK (id=1))
        - PRAGMA journal_mode=WAL + busy_timeout=30000 (matching session_repository.py pattern)
        - read(session_id, key) -> str | None
        - write(session_id, key, value) -> int  [atomically increments version_counter.version; returns new version]
        - delete(session_id, key) -> None
        - list(session_id) -> list[dict]  [{key, value, version, updated_at}]
        - get_version() -> int
      Values are stored as TEXT; callers are responsible for JSON serialization.
      Use parameterized SQL throughout (no f-string interpolation in SQL).
    wave: 1
    agent: gem-implementer
    priority: high
    status: pending
    dependencies: []
    estimated_effort: medium
    estimated_files: 1
    estimated_lines: 120
    focus_area: metis_app/services/
    tech_stack:
