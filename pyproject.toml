[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "axiom-app"
version = "0.1.0"
description = "Axiom — Personal RAG desktop application with an opt-in MVC runtime"
readme = "README.md"
requires-python = ">=3.10"
license = { file = "LICENSE" }
authors = [
  { name = "mrzapa" },
]
keywords = ["rag", "llm", "desktop", "tkinter", "cli"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
# Runtime dependencies are intentionally minimal; heavy ML libs (LangChain,
# sentence-transformers, llama-cpp-python) are optional/user-installed.
dependencies = []

[project.optional-dependencies]
dev = [
    "pytest>=8",
    "pytest-cov>=5",
    "ruff>=0.6",
    "pre-commit>=3.8",
]
live-backends = [
    "weaviate-client>=4,<5",
]
kreuzberg = [
    "kreuzberg",
]
all = [
    "kreuzberg",
    "weaviate-client>=4,<5",
]

[project.scripts]
axiom-parity-audit = "axiom_app.audit:main"

[tool.setuptools]
license-files = ["LICENSE"]

[tool.setuptools.packages.find]
# Only package axiom_app; exclude the legacy monolith and test tree.
include = ["axiom_app*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts   = "-q --tb=short"

[tool.ruff]
exclude = [
  "agentic_rag_gui.py",
]
